version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-qa
    ports:
      - "8080:8080"      # Jenkins Web UI
      - "50000:50000"    # Agent 通信
    volumes:
      - jenkins_home:/var/jenkins_home   # 持久化 Jenkins 配置
      - /var/run/docker.sock:/var/run/docker.sock  # 允许 Jenkins 操控宿主机 Docker
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

volumes:
  jenkins_home:
