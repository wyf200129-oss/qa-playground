[pytest]
markers =
    login: 登录相关用例
    vendor: 供应商相关用例

addopts = -s -v --capture=sys --alluredir=./allure_data/

testpaths = ./test_cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

xfail_strict = False

log_cli = true
log_cli_level = info
log_cli_format = %(levelname)s %(asctime)s %(filename)s : %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = ./log/test.log
log_file_level = info
log_file_format = %(levelname)s %(asctime)s %(filename)s : %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
